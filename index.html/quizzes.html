<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Upload</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(#1F4072);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.quiz-container{
    width: 50%;
    max-width:1400px;
    background:#ffffff;
    border:2px solid #1F4072;
    border-radius:20px;
    padding:40px;
}

h1{
    text-align:center;
    color: #1F4072;;
    margin-bottom:30px;
    text-shadow:0 0 10px #1F4072;
}

.form-group{
    margin-bottom:25px;
}

input[type="text"]{
    width:100%;
    padding:18px;
    border:2px solid #1F4072;
    border-radius:12px;
    font-size:18px;
    outline:none;
}

input[type="file"]{
    width:100%;
    padding:15px;
    border:2px solid #1F4072;
    border-radius:12px;
    background:#FFF3B4;
    cursor:pointer;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#1F4072;
    color:#FFF3B4;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.preview{
    margin-top:30px;
    text-align:center;
}

.preview img{
    max-width:300px;
    border-radius:12px;
    border:3px solid #1F4072;
    display:none;
    margin:auto;
}

.file-name{
    color:#1F4072;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="quiz-container">

    <h1>📘 Quiz Upload</h1>

    <form id="quizForm">

        <div class="form-group">
            <input
                type="text"
                id="title"
                placeholder="Enter Title"
                required
            >
        </div>

        <div class="form-group">
            <input
                type="file"
                id="imageFile"
                accept="image/*"
                required
            >
        </div>

        <button type="submit">Submit</button>

    </form>

    <div class="preview">
        <img id="previewImage">
        <div class="file-name" id="fileName"></div>
    </div>

</div>

<script>

const imageFile = document.getElementById("imageFile");
const previewImage = document.getElementById("previewImage");
const fileName = document.getElementById("fileName");

imageFile.addEventListener("change", function(){

    const file = this.files[0];

    if(file){

        fileName.textContent = file.name;

        const reader = new FileReader();

        reader.onload = function(e){
            previewImage.src = e.target.result;
            previewImage.style.display = "block";
        }

        reader.readAsDataURL(file);
    }
});

document.getElementById("quizForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const title = document.getElementById("title").value;

    alert("Quiz Submitted!\nTitle: " + title);

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzes</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #FFF3B4;;
  background-size: 400% 400%;
  animation: move 10s ease infinite;
  color: #1F4072;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding-top: 80px;
}

@keyframes move {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  color: #1F4072;
  margin-bottom: 40px;
  text-align: center;
  font-size: 2em;
  letter-spacing: 1px;
  text-shadow: 0 0 10px #1F4072;
}

.photo-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
  margin-bottom: 40px;
}

.photo-box {
  background-color: #FFF3B4;
  border: 2px solid #1F4072;
  border-radius: 15px;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 250px;
  height: 250px;
  transition: transform 0.3s ease;
}

.photo-box:hover {
  transform: scale(1.05);
}

.photo-box img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  border: 3px solid #1F4072;
  cursor: pointer;
}

a {
  margin-top: 10px;
  color: #1F4072;
  text-decoration: none;
  border: 2px solid #1F4072;
  padding: 10px 25px;
  border-radius: 8px;
  transition: 0.3s;
  font-weight: bold;
}

a:hover {
  background-color: #FFF3B4;
  color: #1F4072;
  box-shadow: #FFF3B4;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,65,106,.92);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
  z-index: 1000;
}

.overlay.active {
  opacity: 1;
  pointer-events: all;
}

.overlay img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
  border: 3px solid #1F4072;
  box-shadow: 0 0 25px #1F4072;
  transform: scale(0.8);
  transition: 0.3s ease;
}

.overlay.active img {
  transform: scale(1);
}

.overlay h2 {
  margin-top: 15px;
  color: #FFF3B4;
  text-shadow: 0 0 10px #1F4072;
}
</style>
</head>

<body>

<h1>📘 QUIZZES</h1>

<div class="photo-row">
  <div class="photo-box">
    <img src="quiz1.jpg" alt="Quiz 1">
  </div>
  <div class="photo-box">
    <img src="quiz2.jpg" alt="Quiz 2">
  </div>
  <div class="photo-box">
    <img src="quiz3.1.jpg" alt="Quiz 3.1">
  </div>
  <div class="photo-box">
    <img src="quiz3.2.jpg" alt="Quiz 3.2">
  </div>
  <div class="photo-box">
    <img src="long quiz midterm.jpg" alt="Long Quiz Midterm">
  </div>
  <div class="photo-box">
    <img src="final quiz 1.jpg" alt="Final Quiz 1">
  </div>
  <div class="photo-box">
    <img src="final quiz 2.jpg" alt="Final Quiz 2">
  </div>
  <div class="photo-box">
    <img src="long quiz finals.jpg" alt="Long Quiz Finals">
  </div>
</div>

<a href="index.html">← Back to Portfolio</a>


<div class="overlay" id="overlay">
  <img id="overlayImg" src="">
  <h2 id="overlayTitle"></h2>
</div>

<script>
const images = document.querySelectorAll(".photo-box img");
const overlay = document.getElementById("overlay");
const overlayImg = document.getElementById("overlayImg");
const overlayTitle = document.getElementById("overlayTitle");

let isOpen = false;

images.forEach(img => {
  img.addEventListener("click", () => {
    if (!isOpen) {
      overlay.classList.add("active");
      overlayImg.src = img.src;
      overlayTitle.textContent = img.alt;
      isOpen = true;
    }
  });
});

overlay.addEventListener("click", () => {
  overlay.classList.remove("active");
  isOpen = false;
});
</script>

</body>
</html>
