<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:#FFF3B4
  background-size:400% 400%;
  animation:move 10s ease infinite;
  color:#1F4072;
  display: flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding-top: 60px;
}

@keyframes move {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  color: #154072;
  text-shadow: 0 0 10px #154072;
  margin-bottom: 40px;
}

.dashboard {
  display: grid;
  grid-template-columns: 200px 400px;
  grid-template-rows: repeat(3, 90px);
  gap: 20px 30px;
}

.card:nth-child(1) { grid-column: 1; grid-row: 1; }
.card:nth-child(2) { grid-column: 1; grid-row: 2; }
.card:nth-child(3) { grid-column: 1; grid-row: 3; }

.main-card {
  grid-column: 2;
  grid-row: 1 / span 3;

  align-self: center; 
  justify-self: center;

  width: 400px;
  height: 220px;
  border-radius: 15px;
  border: 2px solid #154072;
  background:#FFF3B4;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.main-card h2 {
  font-size: 60px;
  margin: 0;
  color: #154072;
  text-shadow: 0 0 15px #154072;
}

.main-card p {
  margin-top: 10px;
  letter-spacing: 2px;
}

.card {
  width: 200px;
  height: 90px;
  border-radius: 12px;
  border: 2px solid #FFF3B4;
  background:#FFF3B4;
  box-shadow: 0 0 15px rgba(0,229,255,0.4);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.card h3 {
  margin: 0;
  color: #154072;
  text-shadow: 0 0 10px #154072;
}

.card p {
  margin: 5px 0 0;
  font-size: 12px;
}

a {
  margin-top: 40px;
  color: #154072;
  text-decoration: none;
  border: 2px solid #154072;
  padding: 10px 25px;
  border-radius: 8px;
  transition: 0.3s;
  font-weight: bold;
}

a:hover {
  background-color: #154072;
  color: #FFF3B4;
  box-shadow: 0 0 15px #154072;
}
</style>
</head>

<body>

<h1>📈 Dashboard</h1>

<div class="dashboard">
  <div class="card">
    <h3 id="quiz">0</h3>
    <p>Quiz Uploads</p>
  </div>

  <div class="card">
    <h3 id="act">0</h3>
    <p>Activity Uploads</p>
  </div>

  <div class="card">
    <h3 id="exam">0</h3>
    <p>Exam Uploads</p>
  </div>

  <div class="main-card">
    <h2 id="total">0</h2>
    <p>Total Uploads</p>
  </div>

</div>

<a href="index.html">← Back to Portfolio</a>

<script>
let quiz = 7;
let act = 1;
let exam = 1;

let total = quiz + act + exam;

document.getElementById("quiz").innerText = ">" + quiz;
document.getElementById("act").innerText = ">" + act;
document.getElementById("exam").innerText = ">" + exam;
document.getElementById("total").innerText = ">" + total;
</script>

</body>
</html>
